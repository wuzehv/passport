      - application/x-www-form-urlencoded
      description: 接口列表
      parameters:
      - description: 页码
        in: query
        minimum: 1
        name: page
        type: integer
      - description: 每页数量
        in: query
        minimum: 1
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/util.Response'
