                data:
                  $ref: '#/definitions/model.Action'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/util.Response'
      tags:
      - 接口管理
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: 添加接口
      parameters:
