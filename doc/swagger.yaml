basePath: /
definitions:
  model.Action:
    properties:
      id:
        type: integer
      remark:
        type: string
      url:
        type: string
    type: object
  model.Client:
    properties:
      callback:
        type: string
      domain:
        type: string
      id:
        type: integer
      secret:
        type: string
    type: object
  model.User:
    properties:
      email:
        type: string
      gender:
        type: integer
      id:
        type: integer
      mobile:
        type: string
      realname:
        type: string
    type: object
  util.Response:
    properties:
      code:
        type: integer
      data:
        type: object
      message:
        type: string
    type: object
